defaults:
  - base

# ETL sequential robustness: score = min_k cosine_dist(z_t, z_k)
# Fires when the robot is off the success manifold at ANY phase.
# No temporal tracking needed — robust to unknown task duration.
n_phases: 5

required_tensors:
  - "obs_embeddings"

optional_tensors: []
required_actions: []
optional_actions: []

hparams:
  model:
    n_phases: ${eval.n_phases}
    required_tensors: ${eval.required_tensors}
